<section class="gallery" id="projects">
  <div class="container">
    <h2 class="gallery-title">Our Projects</h2>

    <div class="swiper gallery-swiper">
      <div class="swiper-wrapper">
        <div class="swiper-slide gallery-animate">
          <img src="/img/gallery-1.jpg" alt="Project 1" class="gallery-img" />
        </div>
        <div class="swiper-slide gallery-animate">
          <img src="/img/gallery-2.jpg" alt="Project 2" class="gallery-img" />
        </div>
        <div class="swiper-slide gallery-animate">
          <img src="/img/gallery-3.jpg" alt="Project 3" class="gallery-img" />
        </div>
        <div class="swiper-slide gallery-animate">
          <img src="/img/gallery-4.jpg" alt="Project 4" class="gallery-img" />
        </div>
        <div class="swiper-slide gallery-animate">
          <img src="/img/gallery-5.jpg" alt="Project 5" class="gallery-img" />
        </div>
        <div class="swiper-slide gallery-animate">
          <img src="/img/gallery-6.jpg" alt="Project 6" class="gallery-img" />
        </div>
      </div>

      <div class="swiper-button-prev"></div>
      <div class="swiper-button-next"></div>
    </div>
  </div>
</section>

<div class="lightbox" id="lightbox">
  <button
    type="button"
    class="lightbox-close"
    id="lightbox-close"
    aria-label="Close"
  >
    ×
  </button>

  <button
    type="button"
    class="lightbox-arrow lightbox-prev"
    id="lightbox-prev"
    aria-label="Previous image"
  >
    ‹
  </button>

  <div class="lightbox-content">
    <img
      src=""
      alt="Expanded project image"
      class="lightbox-img"
      id="lightbox-img"
    />
  </div>

  <button
    type="button"
    class="lightbox-arrow lightbox-next"
    id="lightbox-next"
    aria-label="Next image"
  >
    ›
  </button>
</div>
