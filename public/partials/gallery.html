<section class="gallery" id="projects">
  <div class="container">
    <h2 class="gallery-title">Our Projects</h2>

    <div class="swiper gallery-swiper">
      <div class="swiper-wrapper">
        <div class="swiper-slide gallery-animate">
          <img
            src="/img/gallery-1.webp"
            alt="Interior painting services in Sarasota living room"
            class="gallery-img"
          />
        </div>
        <div class="swiper-slide gallery-animate">
          <img
            src="/img/gallery-2.webp"
            alt="Exterior house painting with clean white finish in North Port"
            class="gallery-img"
          />
        </div>
        <div class="swiper-slide gallery-animate">
          <img
            src="/img/gallery-3.webp"
            alt="Smooth drywall finishing and wall preparation in Port Charlotte"
            class="gallery-img"
          />
        </div>
        <div class="swiper-slide gallery-animate">
          <img
            src="/img/gallery-4.webp"
            alt="Home renovation project with new flooring and walls"
            class="gallery-img"
          />
        </div>
        <div class="swiper-slide gallery-animate">
          <img
            src="/img/gallery-5.webp"
            alt="Drywall installation in residential house"
            class="gallery-img"
          />
        </div>
        <div class="swiper-slide gallery-animate">
          <img
            src="/img/gallery-6.webp"
            alt="Drywall repair and finishing in Tampa home"
            class="gallery-img"
          />
        </div>
        <div class="swiper-slide gallery-animate">
          <img
            src="/img/gallery-7.webp"
            alt="Home improvement and renovation project"
            class="gallery-img"
          />
        </div>
        <div class="swiper-slide gallery-animate">
          <img
            src="/img/gallery-8.webp"
            alt="Professional drywall repair service"
            class="gallery-img"
          />
        </div>
      </div>

      <div class="swiper-button-prev"></div>
      <div class="swiper-button-next"></div>
    </div>
  </div>
</section>

<div class="lightbox" id="lightbox">
  <button
    type="button"
    class="lightbox-close"
    id="lightbox-close"
    aria-label="Close"
  >
    ×
  </button>

  <button
    type="button"
    class="lightbox-arrow lightbox-prev"
    id="lightbox-prev"
    aria-label="Previous image"
  >
    ‹
  </button>

  <div class="lightbox-content">
    <img
      src=""
      alt="Expanded project image"
      class="lightbox-img"
      id="lightbox-img"
    />
  </div>

  <button
    type="button"
    class="lightbox-arrow lightbox-next"
    id="lightbox-next"
    aria-label="Next image"
  >
    ›
  </button>
</div>
